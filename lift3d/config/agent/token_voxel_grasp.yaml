name: TokenVoxelGraspActor
instantiate_config:
  _target_: lift3d.models.actor.TokenVoxelGraspActor

  # ① 点云编码器（Lift3d‑CLIP + LoRA 已在 model_loader 里处理）
  point_cloud_encoder:
    _target_: lift3d.models.lift3d.model_loader.lift3d_clip_base
    return_tokens: true
    return_xyz: true

  token_dropout_rate: 0.0
  robot_state_dropout_rate: 0.0

  # ② 体素化 & Sparse U‑Net
  voxel_size: 0.01                       # 1 cm 体素
  pc_range: [-0.6, -0.6, -0.2, 0.6, 0.6, 0.5]
  k_nearest: 4

  sparse_unet_cfg:
    # in_ch: 768
    base_ch: 96
    depth: 3
    out_ch: 1

  # ③ Heads (用默认即可，也可覆写 hidden_dims 等)
  orient_head_cfg: {}
  gripper_head_cfg: {}